<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d2218"/>
      <stop offset="45%" stop-color="#1B4332"/>
      <stop offset="100%" stop-color="#2D6A4F"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="url(#glow)"/>

  <!-- Corner brackets -->
  <g stroke="#C9A84C" stroke-width="1.5" fill="none" opacity="0.45">
    <polyline points="30,66 30,30 66,30"/>
    <polyline points="534,30 570,30 570,66"/>
    <polyline points="30,734 30,770 66,770"/>
    <polyline points="534,770 570,770 570,734"/>
  </g>

  <!-- Camera icon -->
  <g transform="translate(300,320)" stroke="#C9A84C" fill="none" opacity="0.38">
    <rect x="-48" y="-28" width="96" height="66" rx="8" stroke-width="2"/>
    <circle cx="0" cy="8" r="21" stroke-width="1.8"/>
    <rect x="-13" y="-36" width="26" height="11" rx="4" stroke-width="1.8"/>
    <circle cx="34" cy="-16" r="4" fill="#C9A84C" stroke="none" opacity="0.6"/>
  </g>

  <text x="300" y="438" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-size="38" font-style="italic" fill="#FAF7F2" opacity="0.75" letter-spacing="1">Emerald Bride</text>
  <text x="300" y="480" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="14" fill="#C9A84C" opacity="0.8" letter-spacing="5">ARTIST PORTRAIT · 600 × 800px</text>
  <text x="300" y="512" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#FAF7F2" opacity="0.28" letter-spacing="1">Replace with ./images/artist.jpg</text>
</svg>
